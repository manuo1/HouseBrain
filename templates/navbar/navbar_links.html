{% load static %}

<!-- Heating links -->
{% include "navbar/heating_links.html" %}

<!-- User links -->
{% if user.is_authenticated %}
<!-- logout Button -->
<li class="nav-item"><a class="nav-link" href="{% url 'authentication:logout' %}">{{user.username}} <i class="bi bi-box-arrow-right"></i></a></li>
<!-- Admin access -->
{% if user.is_superuser %}
<li class="nav-item"><a class="nav-link" href="{% url 'admin:index' %}">Django Admin</a></li>
{% endif %}
{% else %}
<li class="nav-item"><a class="nav-link" href="{% url 'authentication:login' %}">Connexion</a></li>
{% endif %}
