<!doctype html>
<html lang="en">

<!-- Head ################################################### -->
  <head>
    <!-- Meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-wEmeIV1mKuiNpC+IOBjI7aAzPcEZeedi5yW5f2yOq55WWLwNGmvvx4Um1vskeMj0" crossorigin="anonymous">

    <!-- Head / title -->
    <title>{% block title %}House Brain{% endblock %}</title>
  </head>

<!-- Body ################################################### -->
  <body>

    <!-- Body / header -->
    <header>
      <div class="container">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
          <div class="container-fluid">
            <a class="navbar-brand" href={% url 'housebrain:homepage' %}>House Brain</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
              <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {% if user.is_authenticated %}
                <li class="nav-item"><a class="nav-link active" href="{% url 'authentication:logout' %}">Déconnexion ({{user.username}})</a></li>
                {% if user.is_superuser %}<li class="nav-item"><a class="nav-link active" href="{% url 'admin:index' %}">Administration de Django</a></li>{% endif %}
                {% else %}
                <li class="nav-item"><a class="nav-link active" href="{% url 'authentication:login' %}">Connexion</a></li>
                {% endif %}
              </ul>
              <span class="navbar-text">
                {{ date_time }}
              </span>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <!-- Body / main / custom zone -->
    <div class="container">
    {% block main %}
    {% endblock %}
    </div>

    <!-- Body / footer -->
    <footer>
    </footer>

     <!-- JavaScript Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-p34f1UUtsS3wqzfto5wAAmdvj+osOnFyQFpp4Ua3gs/ZVWx6oOypYoCJhGGScy+8" crossorigin="anonymous"></script>
  </body>
</html>
