{% extends 'base.html' %}
{% load static %}
{% block title %}House Brain{% endblock %}
{% block main %}

<div class="accordion" id="accordionPanelsStayOpen">
  <!-- all rooms with heating -->

  {% for room in rooms_heating_periods %}
  <div class="accordion-item">
    <h2 class="accordion-header" id="heading{{room.room.id}}">
      <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{room.room.id}}" aria-expanded="false" aria-controls="collapse{{room.room.id}}">
        <div class="container px-1">

          <div class="row gx-1 px-0">
            <div class="col-12">
              <div class="border rounded-3 bg-light text-truncate py-1 px-1">{{room.room.name}}</div>
            </div>
          </div>

        </div>
      </button>
    </h2>
    <div id="collapse{{room.room.id}}" class="accordion-collapse collapse" aria-labelledby="heading{{room.room.id}}">
      <div class="accordion-body">
        {% for heating_period in room.heating_periods %}
        {{heating_period}}<br>
        {% endfor %}
      </div>
    </div>
  </div>
  {% endfor %}

</div>

{% endblock %}
