{% extends 'base.html' %}
{% load static %}
{% block title %}House Brain{% endblock %}
{% block main %}

    <div class="accordion" id="accordion">

      {% for room in data %}
      <div class="accordion-item">
        <h2 class="accordion-header" id="heading{{room.id}}">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{room.id}}" aria-expanded="false" aria-controls="collapse{{room.id}}">
            <div class="container px-1">
              <div class="row gx-1">
                <div class="col-2">
                 <div class="p-1 border bg-light {{room.color}}">{{room.heater_state}}</div>
                </div>
                <div class="col-6">
                  <div class="p-1 border bg-light text-truncate">{{room.name}}</div>
                </div>
                <div class="col-2">
                 <div class="p-1 border bg-light">{{room.setpoint_temperature}}</div>
                </div>
                <div class="col-2">
                 <div class="p-1 border bg-light">{{room.measured_temperature}}</div>
                </div>
            </div>
            </div>
          </button>
        </h2>
        <div id="collapse{{room.id}}" class="accordion-collapse collapse" aria-labelledby="heading{{room.id}}" data-bs-parent="#accordion">
          <div class="accordion-body">
            Partie cachée
          </div>
        </div>
      </div>
      {% endfor %}

    </div>



{% endblock %}
