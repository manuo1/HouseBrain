{% extends 'base.html' %}
{% load static %}
{% block title %}House Brain{% endblock %}
{% block main %}

<p>

<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">Etat</th>
      <th scope="col">Nom</th>
      <th scope="col">Consigne</th>
      <th scope="col">Mesure</th>
    </tr>
  </thead>
  <tbody>

    {% for room in data %}
    <tr>
      <th scope="row">{{room.0}}</th>
      <td>{{room.1}}</td>
      <td>{{room.2}}</td>
      <td>{{room.3}}</td>
    </tr>
    {% endfor %}

  </tbody>
</table>
</p>

{% endblock %}
