{% extends 'base.html' %}
{% load static %}
{% block title %}House Brain{% endblock %}
{% block main %}

<p>

<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">Etat</th>
      <th scope="col">Nom</th>
      <th scope="col">Consigne</th>
      <th scope="col">Mesure</th>
    </tr>
  </thead>
  <tbody>

    {% for room in data %}
    <tr>
      <th scope="row" class="{{room.color}}">{{room.heater_state}}</th>
      <td>{{room.name}}</td>
      <td>{{room.setpoint_temperature}}</td>
      <td>{{room.measured_temperature}}</td>
    </tr>
    {% endfor %}

  </tbody>
</table>
</p>

{% endblock %}
