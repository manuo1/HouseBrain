<!-- Button trigger offcanvas -->
<button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="offcanvas" data-bs-target="#copyHeatingMode_HM{{heating_mode.id}}W{{weekday}}R{{room.id}}HP{{heating_period.id}}_OffcanvasRight" title = "Copier le mode {{heating_mode.name}}">
  <i class="bi bi-back"></i> Mode {{heating_mode.name}}
</button>


<div class="offcanvas offcanvas-end" tabindex="-1" id="copyHeatingMode_HM{{heating_mode.id}}W{{weekday}}R{{room.id}}HP{{heating_period.id}}_OffcanvasRight" aria-labelledby="offcanvasRightLabel">
  <!-- Offcanvas header -->
  <div class="offcanvas-header">
    <h5 id="offcanvasRightLabel">
      Copier le mode {{heating_mode.name}}
    </h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <!-- Offcanvas body -->
  <form action="{% url 'housebrain:heating_periods' heating_mode.id %}?page={{ weekdays_pages.number }}" method="post">
    {% csrf_token %}
    <div class="offcanvas-body">
      Choix du mode
      <br><hr><strong>En cours de développement</strong><hr><br>

    </div>
    <!-- Modal footer -->
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="offcanvas" aria-label="Close">Annuler</button>
      <button type="submit" value="{'heating_mode':{{heating_mode.id}},'weekday':'{{weekday}}','room':{{room.id}} }" name="copy_heating_mode" class="btn btn-success">Copier</button>
    </div>
  </form>
</div>
