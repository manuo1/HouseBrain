<div class="accordion" id="accordion">
  <div class="accordion-item">
    <!-- visible part  -->
    <h2 class="accordion-header" id="heading_global_features">
      <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#collapse_global_features" aria-expanded="false" aria-controls="collapse_global_features">
        <div class="container px-1">
          <div class="row gx-1 px-0">
            <div class="col-12">
              {% if consumptions %}
              <table class="table text-center">
                <thead>
                  <tr>
                    <th scope="col"></th>
                    {% for name in consumptions.0.values.keys %}
                    <th scope="col"><sup>{{name}}</sup></th>
                    {% endfor%}
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td scope="row">{{consumptions.0.date|date:'D d/m'}}</td>
                    {% for name, value in consumptions.0.values.items %}
                    <td>{{value}}</td>
                    {% endfor %}
                  </tr>
                </tbody>
              </table>
              {% else %}
                Pas de données
              {% endif %}
            </div>
          </div>
        </div>
      </button>
    </h2>
    <!-- collapsible part  -->
    <div id="collapse_global_features" class="accordion-collapse collapse" aria-labelledby="heading_global_features" data-bs-parent="#accordion">
      <div class="accordion-body">
        <div class="container px-1">
          <div class="row gx-1 px-0">
            <div class="col-12">
              {% if consumptions %}
              <table class="table text-center">
                <thead>
                  <tr>
                    <th scope="col"></th>
                    {% for name in consumptions.0.values.keys %}
                    <th scope="col">{{name}} </th>
                    {% endfor%}
                  </tr>
                </thead>
                <tbody>
                  {% for consumption in consumptions|slice:"1:" %}
                  <tr>
                    <th scope="row">{{consumption.date|date:'D d/m'}}</th>
                    {% for name, value in consumption.values.items %}
                    <td>{{value}}</td>
                    {% endfor %}
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            {% else %}
              Pas de données
            {% endif %}
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
